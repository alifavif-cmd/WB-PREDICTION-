/* ════ AUTO CHECK ════ */
function checkAuto(wib){
  if(wib.getSeconds()>9) return;
  var h=wib.getHours(), m=wib.getMinutes(), day=wib.getDay(), dk=wib.toDateString();
  SCH.forEach(function(s){
    if(s.g) return;
    var dok=!s.days||s.days.indexOf(day)>=0;
    if(!dok) return;
    if(h===s.H && m===s.M){
      var key=s.n+'_'+dk;
      if(!triggered[key]){
        triggered[key]=true;
        showToast('🔔 '+s.e+' '+s.n+' keluar! Sinkron semua…','warn',4500);
        setTimeout(function(){ syncAll(s.e+' '+s.n+' keluar — Update semua fitur'); },1500);
      }
    }
  });
}

/* ════ COUNTDOWN ════ */
function getNext(wib){
  var ns=wib.getHours()*3600+wib.getMinutes()*60+wib.getSeconds();
  var day=wib.getDay(); var best=null,bd=Infinity;
  SCH.forEach(function(s){
    if(s.g) return;
    var dok=!s.days||s.days.indexOf(day)>=0;
    if(dok){ var d=s.H*3600+s.M*60-ns; if(d>0&&d<bd){bd=d;best=s;} }
    for(var dd=1;dd<=7;dd++){
      var nd=(day+dd)%7, nok=!s.days||s.days.indexOf(nd)>=0;
      if(nok){ var d2=(s.H*3600+s.M*60)+dd*86400-ns; if(d2>0&&d2<bd){bd=d2;best=s;break;} }
    }
  });
  return {p:best,sec:bd};
}

  var sb=document.getElementById('schbtn');
  var cd=document.getElementById('cdpill');
  if(!sp.contains(e.target)&&e.target!==sb&&e.target!==cd){
    sp.classList.remove('open'); sb.classList.remove('open');
  }
});

function renderSch(wib,q){
  var list=document.getElementById('schlist'); list.innerHTML='';
  var nowMin=wib.getHours()*60+wib.getMinutes();
  var day=wib.getDay(); var total=0;
  SCH.forEach(function(s){
    if(s.g){
      if(!q){ var g=document.createElement('div'); g.className='sgrp'; g.textContent=s.g; list.appendChild(g); }
      return;
    }
    total++;
    if(q && s.n.toLowerCase().indexOf(q)<0) return;
    var dok=!s.days||s.days.indexOf(day)>=0;
    var rMin=s.H*60+s.M, diff=rMin-nowMin;
    var dot,cd;
    if(!dok)              {dot='didle';cd='Tdk hari ini';}
    else if(diff<=0&&diff>-10){dot='dlive';cd='Baru keluar!';}
    else if(diff>0&&diff<=30) {dot='dsoon';cd='Sebentar lagi';}
    else if(diff>0){var hh=Math.floor(diff/60),mm=diff%60;dot='didle';cd=(hh?hh+'j ':'')+mm+'m lagi';}
    else           {dot='didle';cd='Sudah keluar';}
    var row=document.createElement('div'); row.className='srow';
    row.innerHTML='<div class="smkt"><div class="'+dot+'"></div>'+s.e+' '+s.n+'</div>'+
      '<div class="stcol"><div class="stm">'+pad(s.H)+':'+pad(s.M)+'</div><div class="scd">'+cd+'</div></div>';
    list.appendChild(row);
  });
  document.getElementById('schtotal').textContent='('+total+')';
}

/* ════ TOAST ════ */
function showToast(msg,type,dur){
  type=type||'info'; dur=dur||3000;
  var el=document.createElement('div'); el.className='toast '+type; el.textContent=msg;
  document.getElementById('toastwrap').appendChild(el);
  setTimeout(function(){ el.classList.add('out'); setTimeout(function(){if(el.parentNode)el.remove();},300); },dur);
}

/* ════ UTILS ════ */
function pad(n){return String(n).padStart(2,'0');}
function getWIB(){
  var n=new Date();
  // Konversi ke UTC dulu, lalu tambah 7 jam (WIB)
  var utc=n.getTime()+n.getTimezoneOffset()*60000;
  return new Date(utc+7*3600000);
}

/* ════ TICK ════ */
function tick(){
  var wib=getWIB();
  document.getElementById('clk').textContent=pad(wib.getHours())+':'+pad(wib.getMinutes())+':'+pad(wib.getSeconds());
  var nx=getNext(wib);
  if(nx.p){
    var h=Math.floor(nx.sec/3600),m=Math.floor((nx.sec%3600)/60),s=nx.sec%60;
    document.getElementById('cdmkt').textContent=nx.p.e+' '+nx.p.n;
    document.getElementById('cdtime').textContent=pad(h)+':'+pad(m)+':'+pad(s);
    document.getElementById('cdpill').classList.toggle('urgent',nx.sec<300);
  }
  checkAuto(wib);
  if(document.getElementById('schpanel').classList.contains('open'))
    renderSch(wib,document.getElementById('schsearch').value.toLowerCase());
  setTimeout(tick,1000);
}

/* ════ INIT ════ */
tick();
var tot=SCH.filter(function(s){return !s.g;}).length;
setTimeout(function(){ showToast('⚡ WONGBAGUS PREDICTION — '+tot+' pasaran auto-sync aktif','info',4000); },1200);
</script>
