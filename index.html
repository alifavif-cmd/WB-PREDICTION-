<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0c10; --surface: #111318; --border: #1e2230;
  --gold: #f5c842; --text: #dde3f0; --muted: #5a6580;
  --bar-h: 48px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; overflow: hidden; }

#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 14px; gap: 10px; z-index: 100;
}
#logo { display: flex; align-items: center; gap: 8px; }
#logo .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px var(--gold);
  animation: pulse 1.8s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
#logo span { font-family:'Oswald',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; color:var(--gold); text-transform:uppercase; }
#clock { font-family:'Oswald',monospace; font-size:13px; color:var(--muted); letter-spacing:1px; margin-left:auto; }
#clock b { color:var(--gold); }

#frames { position: fixed; top: var(--bar-h); left: 0; right: 0; bottom: 58px; }
.fw { position: absolute; inset: 0; display: none; flex-direction: column; }
.fw.active { display: flex; }
.fw iframe { flex: 1; width: 100%; border: none; background: #fff; }

.loader {
  position: absolute; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  z-index: 10; transition: opacity .4s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }

#mnav {
  display: flex; position: fixed; bottom: 0; left: 0; right: 0;
  height: 58px; background: var(--surface); border-top: 1px solid var(--border); z-index: 100;
}
.mb {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; font-family:'Oswald',sans-serif;
  font-size: 9px; letter-spacing: .5px; text-transform: uppercase;
  color: var(--muted); user-select: none; transition: color .18s;
}
.mi { font-size: 18px; }
.mb[data-i="0"].active { color:#f5c842; }
.mb[data-i="1"].active { color:#e03c3c; }
.mb[data-i="2"].active { color:#3a7bff; }
.mb[data-i="3"].active { color:#2ecc71; }
.mb[data-i="4"].active { color:#f97316; }
.mb[data-i="5"].active { color:#c77dff; }
</style>
</head>
<body>

<div id="topbar">
  <div id="logo"><div class="dot"></div><span>WONGBAGUS PREDICTION</span></div>
  <div id="clock"><b id="ck-t">--:--:--</b> &nbsp;|&nbsp; <span id="ck-d">---</span></div>
</div>

<div id="frames">
  <div class="fw active" id="fw0">
    <div class="loader" id="ld0"><div class="spinner"></div><p>Memuat Rumus Otomatis…</p></div>
    <iframe id="if0"></iframe>
  </div>
  <div class="fw" id="fw1">
    <div class="loader" id="ld1"><div class="spinner"></div><p>Memuat Rumus Lengkap…</p></div>
    <iframe id="if1"></iframe>
  </div>
  <div class="fw" id="fw2">
    <div class="loader" id="ld2"><div class="spinner"></div><p>Memuat Scanner Rumus…</p></div>
    <iframe id="if2"></iframe>
  </div>
  <div class="fw" id="fw3">
    <div class="loader" id="ld3"><div class="spinner"></div><p>Memuat Paito Warna…</p></div>
    <iframe id="if3"></iframe>
  </div>
  <div class="fw" id="fw4">
    <div class="loader" id="ld4"><div class="spinner"></div><p>Memuat Smart Paito…</p></div>
    <iframe id="if4"></iframe>
  </div>
  <div class="fw" id="fw5">
    <div class="loader" id="ld5"><div class="spinner"></div><p>Memuat Data Togel…</p></div>
    <iframe id="if5"></iframe>
  </div>
</div>

<div id="mnav">
  <div class="mb active" data-i="0" onclick="go(0)"><span class="mi">⚡</span>Otomatis</div>
  <div class="mb"        data-i="1" onclick="go(1)"><span class="mi">📐</span>Rumus</div>
  <div class="mb"        data-i="2" onclick="go(2)"><span class="mi">🔍</span>Scanner</div>
  <div class="mb"        data-i="3" onclick="go(3)"><span class="mi">🎨</span>Paito</div>
  <div class="mb"        data-i="4" onclick="go(4)"><span class="mi">🧠</span>Smart</div>
  <div class="mb"        data-i="5" onclick="go(5)"><span class="mi">📊</span>Data</div>
</div>

<script>
var PAGES = [
  'https://159.65.133.131/rumus-otomatis/',
  'https://159.65.133.131/rumus-lengkap/',
  'https://159.65.133.131/scanner-angkanet-pro/',
  'https://159.65.133.131/paito-warna-north-carolina-day/',
  'https://159.65.133.131/smart-paito-warna-engine/',
  'https://159.65.133.131/data-pengeluaran-togel/'
];

var loaded = {}, cur = 0;

function loadFrame(idx) {
  if (loaded[idx]) return;
  loaded[idx] = true;
  var iframe = document.getElementById('if' + idx);
  iframe.onload = function() {
    var ld = document.getElementById('ld' + idx);
    if (ld) { ld.classList.add('hidden'); setTimeout(function(){ ld.remove(); }, 500); }
  };
  iframe.src = PAGES[idx];
}

function go(idx) {
  if (idx === cur) return;
  document.querySelectorAll('#mnav .mb').forEach(function(b){ b.classList.remove('active'); });
  document.querySelector('#mnav .mb[data-i="' + idx + '"]').classList.add('active');
  document.getElementById('fw' + cur).classList.remove('active');
  document.getElementById('fw' + idx).classList.add('active');
  cur = idx;
  loadFrame(idx);
}

// Clock
(function tick(){
  var now = new Date();
  var days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  var months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  document.getElementById('ck-t').textContent =
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  document.getElementById('ck-d').textContent =
    days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  setTimeout(tick, 1000);
})();

loadFrame(0);
</script>
</body>
</html>
